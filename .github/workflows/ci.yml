name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint markdown
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Check for broken markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'

      - name: Verify standard files exist
        run: |
          files=(
            "CLAUDE.md"
            "README.md"
            "docs/architecture.md"
            "docs/todo.md"
            "docs/accounts-and-access.md"
            "docs/decisions-log.md"
            "docs/security-risk-log.md"
            "docs/setup-steps.md"
            "docs/processes-and-flows.md"
            "docs/content-strategy.md"
            "docs/seo-strategy.md"
            "docs/metrics.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "::error::Required standard files are missing"
            exit 1
          fi

      - name: Validate MkDocs build
        run: |
          pip install mkdocs-material mkdocs-encryptcontent-plugin
          mkdocs build --strict
