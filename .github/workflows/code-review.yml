name: Code Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  duplication-check:
    name: Duplication Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run jscpd duplication detection
        run: |
          npx jscpd . \
            --threshold 5 \
            --reporters consoleFull \
            --ignore "node_modules,.git,vendor"
